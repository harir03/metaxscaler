# Credit Approval Environment — OpenEnv Manifest
name: credit_approval
version: "1.1.0"
description: >
  Multi-step RL environment for credit approval. An agent reviews corporate
  loan applications with progressive data disclosure — starting with company
  and financial data, then optionally requesting risk indicators and market
  context before making a final decision. Features 3 difficulty levels with
  mixed ground truths and structural reasoning evaluation.

spec_version: 1

tasks:
  - name: credit-approval-easy
    description: >
      Clear-cut credit decisions with obvious approve or reject signals.
      Companies either have strong financials and clean records (approve)
      or severe distress with compliance failures (reject). Includes hints.
    grader: server.graders:grade_easy

  - name: credit-approval-medium
    description: >
      Borderline cases with conflicting financial signals. Companies have
      mixed metrics — acceptable ratios but flagged RPTs, or weak growth
      but clean compliance. Requires careful analysis and justified reasoning.
    grader: server.graders:grade_medium

  - name: credit-approval-hard
    description: >
      Adversarial profiles with mixed ground truths. Some look good but
      contain hidden fraud patterns (wilful defaulter, revenue inflation,
      circular trading, evergreening). Others look sketchy but are actually
      creditworthy. Rewards agents that gather info, cite specific values,
      and detect or dismiss fraud patterns correctly.
    grader: server.graders:grade_hard

runtime:
  type: docker
  dockerfile: Dockerfile

app:
  port: 7860
  endpoints:
    reset: /reset
    step: /step
    state: /state
    health: /health
