networks:
  ic-network:
    driver: bridge

services:
  env-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit-approval-env
    restart: unless-stopped
    ports:
      - "7860:7860"
    networks:
      - ic-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
